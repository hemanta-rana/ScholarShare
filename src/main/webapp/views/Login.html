<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ScholarPass | Secure Login</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="../css/Login.css">
</head>
<body>

<div class="container">
    <!-- LEFT SECTION: PRIMARY COLOR #36454F with brand messaging & features -->
    <div class="left">
<!--        <div class="left-content">-->
            <img src="../Images/Login_left%20image.png" alt="Learning Illustration" class="left-image">

<!--        </div>-->
    </div>

    <!-- RIGHT SECTION: SECONDARY COLOR #F5DEB3 as background, login card white -->
    <div class="right">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="welcome-text">Sign in to access your dashboard</p>

            <form action="#" method="post">
                <!-- Email field -->
                <div class="input-group">
                    <input type="email" placeholder="Email address" required>
                </div>

                <!-- Password field -->
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>

                <a href="#" class="forgot-link">Forgot Password?</a>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <!-- or continue with Google (enhanced with icon and subtle box) -->
            <div class="or-divider">
                <hr><span>or continue with</span><hr>
            </div>

            <a href="#" class="google-continue">
                <i class="fab fa-google"></i> Google
            </a>

            <div class="register-link">
                Don't have an account? <a href="#">Register</a>
            </div>
        </div>
    </div>
</div>

<!-- optional note: no external image needed, fully functional design with primary #36454F and secondary #F5DEB3 -->
</body>
</html>
